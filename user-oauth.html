<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAuth 页面代理入口</title>
<style>
body { font-family: sans-serif; background: #0d1117; color: #e6edf3; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
#loading {
    font-size: 1.5rem;
    font-weight: 600;
}
</style>
</head>
<body>

<div id="loading">载入官方管理服务引擎中...</div>

<script>
async function injectManagementApp() {
    try {
        const res = await fetch('/management.html');
        if (!res.ok) throw new Error('无法加载 management.html');
        let html = await res.text();

        // 强制进入 OAuth tab
        if (!window.location.hash || window.location.hash === '#/') {
            window.location.hash = '#/oauth';
        }

        const injectionCode = `
        <script>
        (function() {
            // ── 路由守卫：登录成功后自动跳转 #/oauth ──
            var TARGET_ORIGIN = 'https://cpa.fjmooo.cn';
            var TARGET_URL = TARGET_ORIGIN + '/user-oauth.html#/oauth';
            var wasOnLoginPage = window.location.hash.indexOf('#/login') === 0;

            window.addEventListener('hashchange', function() {
                var currentHash = window.location.hash;
                var isOnLogin = currentHash.indexOf('#/login') === 0;
                var isOnOAuth = currentHash.indexOf('#/oauth') === 0;

                // 检测登录成功：从 #/login 离开且不再是登录页
                if (wasOnLoginPage && !isOnLogin) {
                    wasOnLoginPage = false;
                    // 如果不在目标域名上，重定向到正式域名
                    if (window.location.origin !== TARGET_ORIGIN) {
                        window.location.href = TARGET_URL;
                        return;
                    }
                    // 在目标域名上，直接跳 #/oauth
                    if (!isOnOAuth) {
                        window.location.hash = '#/oauth';
                        return;
                    }
                }

                wasOnLoginPage = isOnLogin;

                // 如果不在登录页也必须在 oauth 页
                if (!isOnLogin && !isOnOAuth) {
                    window.location.hash = '#/oauth';
                }
            });

            // ── API 路径代理：/v0/management → /v0/user-oauth ──
            var originalOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(method, url) {
                if (typeof url === 'string' && url.includes('/v0/management')) {
                    arguments[1] = url.replace('/v0/management', '/v0/user-oauth');
                }
                return originalOpen.apply(this, arguments);
            };

            var originalFetch = window.fetch;
            window.fetch = async function() {
                var url = arguments[0];
                if (typeof url === 'string' && url.includes('/v0/management')) {
                    arguments[0] = url.replace('/v0/management', '/v0/user-oauth');
                } else if (arguments[0] instanceof Request && arguments[0].url.includes('/v0/management')) {
                    arguments[0] = new Request(arguments[0].url.replace('/v0/management', '/v0/user-oauth'), arguments[0]);
                }
                return originalFetch.apply(this, arguments);
            };
        })();
        </scr` + `ipt>
        <style>
             /* 隐藏侧边栏 */
             aside.sidebar, .sidebar { display: none !important; }
             /* 隐藏顶部导航栏 */
             header.main-header, .main-header { display: none !important; }
             
             /* 独占视图适配 */
             .app-shell, .layout-container { 
                 display: block !important; 
                 grid-template-columns: 1fr !important;
             }
             .main-body, .main-content {
                 padding: 0 !important;
                 margin: 0 !important;
                 width: 100vw !important;
                 max-width: 100vw !important;
             }
        </style>
        `;

        html = html.replace('</head>', injectionCode + '</head>');
        document.open();
        document.write(html);
        document.close();

    } catch (err) {
        document.getElementById('loading').innerHTML = '加载失败: ' + err.message;
    }
}

// 立即执行替换
injectManagementApp();
</script>
</body>
</html>
