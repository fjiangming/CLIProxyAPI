<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OAuth 登录</title>
<style>
/* 极简登录页样式，风格匹配 management.html */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Noto Sans SC',sans-serif;background:#0d1117;color:#e6edf3;display:flex;align-items:center;justify-content:center;min-height:100vh}
.login-card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:2.5rem;width:100%;max-width:400px;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
h1{font-size:1.5rem;font-weight:600;margin-bottom:0.5rem;text-align:center}
p{text-align:center;color:#8b949e;font-size:0.85rem;margin-bottom:2rem}
.form-group{margin-bottom:1.5rem}
label{display:block;font-size:0.85rem;margin-bottom:0.5rem;color:#8b949e}
input[type="password"]{width:100%;padding:0.6rem 0.8rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;outline:none;font-size:0.95rem}
input[type="password"]:focus{border-color:#58a6ff}
button{width:100%;padding:0.7rem;background:#238636;color:#fff;border:none;border-radius:6px;font-size:0.95rem;font-weight:600;cursor:pointer;transition:background 0.2s}
button:hover{background:#2ea043}
button:disabled{opacity:0.6;cursor:not-allowed}
.error{color:#f85149;font-size:0.85rem;margin-top:1rem;text-align:center;display:none}
</style>
</head>
<body>

<div class="login-card" id="login-container">
    <h1>认证并进入 OAuth</h1>
    <p>请输入 API Key (非管理密钥)</p>
    <div class="form-group">
        <label>API Key</label>
        <input type="password" id="api-key" placeholder="sk-..." autofocus>
    </div>
    <button id="login-btn" onclick="doLogin()">进入管理面板</button>
    <div id="error-msg" class="error"></div>
</div>

<script>
async function doLogin() {
    const key = document.getElementById('api-key').value.trim();
    if (!key) return;

    const btn = document.getElementById('login-btn');
    const err = document.getElementById('error-msg');
    btn.disabled = true;
    btn.textContent = '验证中...';
    err.style.display = 'none';

    try {
        // 验证 API Key（通过向后端发起任意鉴权请求测试即可，例如这里借用 auth-files）
        const resp = await fetch('/v0/user-oauth/auth-files', {
            headers: { 'Authorization': 'Bearer ' + key }
        });

        if (!resp.ok) {
            throw new Error('API Key 无效或后端拒绝访问');
        }

        // 验证成功，将 Key 保存到 localStorage 让 management.html 能够读取
        localStorage.setItem('cli_proxy_api_secret', key);
        
        // 启动原版 Management HTML 代理注射
        await injectManagementApp();

    } catch (e) {
        err.textContent = e.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '进入管理面板';
    }
}

// 如果之前已经有 key，自动尝试直接加载
(async function autoInit() {
    const saved = localStorage.getItem('cli_proxy_api_secret');
    if (saved) {
        document.getElementById('api-key').value = saved;
        await doLogin();
    }
})();

// 通过 JS 加载并动态魔改 management.html
async function injectManagementApp() {
    document.getElementById('login-container').innerHTML = '<h2>加载组件中，请稍候...</h2>';
    
    try {
        const res = await fetch('/management.html');
        if (!res.ok) throw new Error('无法加载 management.html (可能正在同步下载中)');
        let html = await res.text();

        // 强制进入 OAuth tab
        window.location.hash = '#/oauth';
        
        // 监听 hash 变化，防止跳转到 config / logs 等界面
        window.addEventListener('hashchange', () => {
            if (!window.location.hash.startsWith('#/oauth')) {
                window.location.hash = '#/oauth';
            }
        });

        // ============================================
        // HTTP 拦截：强制把官方的 management 请求路径重定向到我们解耦的 user-oauth 下
        // ============================================
        const injectionCode = `
        <script>
        (function() {
            // 解决 Vue/Axios URL 拦截
            const originalOpen = XMLHttpRequest.prototype.open;
            XMLHttpRequest.prototype.open = function(method, url) {
                if (typeof url === 'string' && url.includes('/v0/management')) {
                    arguments[1] = url.replace('/v0/management', '/v0/user-oauth');
                }
                return originalOpen.apply(this, arguments);
            };

            const originalFetch = window.fetch;
            window.fetch = async function() {
                let url = arguments[0];
                if (typeof url === 'string' && url.includes('/v0/management')) {
                    arguments[0] = url.replace('/v0/management', '/v0/user-oauth');
                } else if (arguments[0] instanceof Request && arguments[0].url.includes('/v0/management')) {
                    arguments[0] = new Request(arguments[0].url.replace('/v0/management', '/v0/user-oauth'), arguments[0]);
                }
                return originalFetch.apply(this, arguments);
            };
        })();
        <\/script>
        <style>
             /* 隐藏左侧边栏，独享 OAuth 页面 */
             .el-aside { display: none !important; }
             /* 隐藏头部部分敏感和无用的工具栏按钮 */
             .header-actions { display: none !important; }
             /* 修复主内容区域布局，避免留白 */
             .el-main { padding: 24px !important; }
             .layout-container { display: block !important; }
        </style>
        `;

        // 篡改原始 HTML，注入逻辑和样式
        html = html.replace('</head>', injectionCode + '</head>');

        // 用注射过的 Management.html 完全覆盖当前整个 DOM
        document.open();
        document.write(html);
        document.close();

    } catch (err) {
        document.getElementById('login-container').innerHTML = 
            '<h2>加载失败</h2><p>' + err.message + '</p><button onclick="localStorage.removeItem(\\'cli_proxy_api_secret\\');window.location.reload()">重新登录</button>';
    }
}
</script>
</body>
</html>
