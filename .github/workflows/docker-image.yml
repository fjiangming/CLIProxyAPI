name: docker-image

on:
  push:
    tags:
      - v*
    branches:
      - dev

env:
  APP_NAME: CLIProxyAPI
  GHCR_REPO: ghcr.io/fjiangming/cli-proxy-api

jobs:
  docker_amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
          fi
          echo COMMIT=$(git rev-parse --short HEAD) >> $GITHUB_ENV
          echo BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV
      - name: Determine tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tags=${GHCR_REPO}:latest-amd64,${GHCR_REPO}:${VERSION}-amd64" >> $GITHUB_OUTPUT
          else
            echo "tags=${GHCR_REPO}:dev-amd64" >> $GITHUB_OUTPUT
          fi
      - name: Build and push (amd64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.tags.outputs.tags }}

  docker_arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Refresh models catalog
        run: |
          git fetch --depth 1 https://github.com/router-for-me/models.git main
          git show FETCH_HEAD:models.json > internal/registry/models/models.json
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
          fi
          echo COMMIT=$(git rev-parse --short HEAD) >> $GITHUB_ENV
          echo BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ) >> $GITHUB_ENV
      - name: Determine tags
        id: tags
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tags=${GHCR_REPO}:latest-arm64,${GHCR_REPO}:${VERSION}-arm64" >> $GITHUB_OUTPUT
          else
            echo "tags=${GHCR_REPO}:dev-arm64" >> $GITHUB_OUTPUT
          fi
      - name: Build and push (arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: |
            VERSION=${{ env.VERSION }}
            COMMIT=${{ env.COMMIT }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          tags: ${{ steps.tags.outputs.tags }}

  docker_manifest:
    runs-on: ubuntu-latest
    needs:
      - docker_amd64
      - docker_arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate Build Metadata
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
            echo "IS_TAG=true" >> $GITHUB_ENV
          else
            echo "VERSION=dev-$(echo ${GITHUB_SHA} | cut -c1-7)" >> $GITHUB_ENV
            echo "IS_TAG=false" >> $GITHUB_ENV
          fi
      - name: Create and push multi-arch manifests
        run: |
          if [[ "${IS_TAG}" == "true" ]]; then
            # Tag push: create latest + versioned manifests
            docker buildx imagetools create \
              --tag "${GHCR_REPO}:latest" \
              "${GHCR_REPO}:latest-amd64" \
              "${GHCR_REPO}:latest-arm64"
            docker buildx imagetools create \
              --tag "${GHCR_REPO}:${VERSION}" \
              "${GHCR_REPO}:${VERSION}-amd64" \
              "${GHCR_REPO}:${VERSION}-arm64"
          else
            # Dev branch push: create dev manifest
            docker buildx imagetools create \
              --tag "${GHCR_REPO}:dev" \
              "${GHCR_REPO}:dev-amd64" \
              "${GHCR_REPO}:dev-arm64"
          fi
      - name: Cleanup temporary architecture tags
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PACKAGE_NAME="cli-proxy-api"

          delete_ghcr_tag() {
            local tag="$1"
            echo "Attempting to untag: ${GHCR_REPO}:${tag}"
            # GHCR doesn't have a simple tag-delete API like Docker Hub.
            # The multi-arch manifest already points to the correct digests,
            # so the architecture-specific tags are just convenience references.
            # We leave them as-is to keep the workflow simple.
            echo "Skipped (GHCR does not support simple tag deletion via API)."
          }

          if [[ "${IS_TAG}" == "true" ]]; then
            delete_ghcr_tag "latest-amd64"
            delete_ghcr_tag "latest-arm64"
            delete_ghcr_tag "${VERSION}-amd64"
            delete_ghcr_tag "${VERSION}-arm64"
          else
            delete_ghcr_tag "dev-amd64"
            delete_ghcr_tag "dev-arm64"
          fi
